name: Sync Multi-Camera Snapshots

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:
  
permissions:
  contents: write  # Grants the runner permission to push commits to your repo

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Mirror All Camera Folders from FTP
      env:
        FTP_SERVER: 138.68.37.43
        FTP_USERNAME: camuser
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        mkdir -p images
        sudo apt-get update && sudo apt-get install -y lftp
        
        # Removed '--reverse=no' entirely since downloading is the default behavior
        lftp -u "$FTP_USERNAME","$FTP_PASSWORD" $FTP_SERVER <<EOF
        set ftp:ssl-allow no
        set xfer:ignore-size yes
        mirror / ./images
        quit
        EOF

    - name: Commit and Push All Camera Updates
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # Check if anything inside the images/ directory changed
        if git status --porcelain images/ | grep -qE "(M|A|\?)"; then
          git add images/
          git commit -m "Automated Multi-Cam Sync: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
        else
          echo "No new camera snapshots detected across any devices."
        fi